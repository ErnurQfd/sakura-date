<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♥ IT LOVE CORE ♥</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1f, #1a0033);
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .container {
      text-align: center;
      z-index: 10;
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00ffcc, #ff00ff, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0, 255, 204, 0.7);
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .subtitle {
      font-size: 1.4rem;
      color: #ff00ff;
      margin-bottom: 40px;
      text-shadow: 0 0 15px #ff00ff;
      animation: glitch 1.5s infinite;
    }

    .heart-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 2rem;
      color: #ff0088;
      text-shadow: 0 0 10px #ff0088,
                   0 0 20px #ff00ff;
      animation: fall linear forwards;
      opacity: 0.9;
      filter: drop-shadow(0 0 8px #ff00ff);
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 255, 204, 0.03) 50%
      );
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 4s linear infinite;
      z-index: 5;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .code-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      color: rgba(0, 255, 100, 0.08);
      font-family: monospace;
      font-size: 14px;
      line-height: 1.4;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
      white-space: pre;
    }
  </style>
</head>
<body>

  <div class="code-bg" id="code-bg"></div>
  <div class="scanline"></div>
  <div class="heart-container" id="hearts"></div>

  <div class="container">
    <h1>♥ CODE &amp; HEART ♥</h1>
    <p class="subtitle">while (love) { deploy(); }</p>
    <p style="color:#00ccff; font-size:1.1rem; margin-top:30px;">
      &lt;3 Full Stack Romantic &lt;/3&gt;
    </p>
  </div>

  <script>
    // Генерация падающих сердечек
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      
      // Разные варианты сердечек
      const hearts = ['♥', '❤', '♡', '💖', '💗', '💓', '💞'];
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];

      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = Math.random() * 4 + 3 + 's'; // 3-7 секунд
      heart.style.fontSize = Math.random() * 1.8 + 1.5 + 'rem';
      heart.style.opacity = Math.random() * 0.7 + 0.4;

      // Случайная задержка
      heart.style.animationDelay = Math.random() * 2 + 's';

      document.getElementById('hearts').appendChild(heart);

      // Удаляем сердечко после анимации
      setTimeout(() => {
        heart.remove();
      }, 10000);
    }

    // Создаём сердечки постоянно
    setInterval(() => {
      createHeart();
    }, 120);

    // Немного больше сердечек при загрузке
    for (let i = 0; i < 25; i++) {
      setTimeout(() => createHeart(), i * 80);
    }

    // Фон с кодом (матрица)
    const codeBg = document.getElementById('code-bg');
    const codeLines = [
      "function love() { return true; }",
      "const heart = new Heart();",
      "deploy(romance);",
      "while (alive) { hug(); }",
      "git commit -m 'added more love'",
      "npm install happiness",
      "<3 <3 <3 <3 <3 <3 <3",
      "console.log('I ❤️ Anelya');"
    ];

    let codeText = '';
    for (let i = 0; i < 40; i++) {
      codeText += codeLines[Math.floor(Math.random() * codeLines.length)] + '\n';
    }
    codeBg.textContent = codeText;
  </script>
</body>
</html>
